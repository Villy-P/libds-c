# .github/workflows/release.yml
name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry and prepend
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --tag ${{ github.event.inputs.version }} --prepend CHANGELOG.md

      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --tag ${{ github.event.inputs.version }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git commit -m "chore(release): ${{ github.event.inputs.version }}"
          git tag ${{ github.event.inputs.version }}
          git push origin main
          git push origin ${{ github.event.inputs.version }}

      - name: Package headers
        run: |
          mkdir -p dist
          zip -r dist/lib-ds-c-${{ github.event.inputs.version }}.zip include/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/*.zip